
<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Context Copy Agent</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="wrap">
    <h1>Context Copy</h1>
    <div id="stats" class="stats">Loading…</div>

    <div class="buttons">
      <div class="split-button" id="copySplit">
        <button id="copyBtn" class="split-button-main" type="button">Copy Context</button>
        <button
          id="copyDropdownToggle"
          class="split-button-toggle"
          type="button"
          aria-haspopup="true"
          aria-expanded="false"
          aria-controls="copyRoleMenu"
        >
          <span class="chevron" aria-hidden="true"></span>
          <span class="sr-only">Copy with role</span>
        </button>
        <div id="copyRoleMenu" class="split-menu" role="menu" hidden>
          <button type="button" class="split-menu-item" data-role="Therapist" role="menuitem">Therapist</button>
          <button type="button" class="split-menu-item" data-role="Data Analyst" role="menuitem">Data Analyst</button>
          <button type="button" class="split-menu-item" data-role="Recommendation Coach" role="menuitem">Recommendation Coach</button>
          <button type="button" class="split-menu-item" data-role="Shopping Analyst (find best deals)" role="menuitem">Shopping Analyst (find best deals)</button>
          <button type="button" class="split-menu-item" data-role="What Did I Miss Analyser" role="menuitem">What Did I Miss Analyser</button>
        </div>
      </div>
      <div class="split-button" id="sendSplit">
        <button id="sendBtn" class="split-button-main" type="button">Send to ChatGPT</button>
        <button
          id="sendDropdownToggle"
          class="split-button-toggle"
          type="button"
          aria-haspopup="true"
          aria-expanded="false"
          aria-controls="sendRoleMenu"
        >
          <span class="chevron" aria-hidden="true"></span>
          <span class="sr-only">Send with role</span>
        </button>
        <div id="sendRoleMenu" class="split-menu" role="menu" hidden>
          <button type="button" class="split-menu-item" data-role="Therapist" role="menuitem">Therapist</button>
          <button type="button" class="split-menu-item" data-role="Data Analyst" role="menuitem">Data Analyst</button>
          <button type="button" class="split-menu-item" data-role="Recommendation Coach" role="menuitem">Recommendation Coach</button>
          <button type="button" class="split-menu-item" data-role="Shopping Analyst (find best deals)" role="menuitem">Shopping Analyst (find best deals)</button>
          <button type="button" class="split-menu-item" data-role="What Did I Miss Analyser" role="menuitem">What Did I Miss Analyser</button>
        </div>
      </div>
      <button id="clearBtn" class="ghost">Panic Erase</button>
      <button id="historyBtn" class="ghost">History</button>
      <a id="opts" class="link" href="#">Options</a>
      <a id="kofiBtn" class="kofi-btn" href="#" aria-label="Support on Ko‑fi">
        <svg class="kofi-icon" width="16" height="16" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="currentColor" d="M3 8h13a4 4 0 1 1 0 8h-1.5a5.5 5.5 0 0 1-11 0V8Zm13 6a2 2 0 0 0 0-4H16v4h0Z"></path>
        </svg>
        <span>Buy me a Ko‑fi</span>
      </a>
    </div>

    <div class="note">
      Data is stored locally. Form inputs are <b>OFF</b> by default. Configure in Options.
    </div>

    <div id="toast" class="toast" hidden>Copied!</div>
    <div id="confirmOverlay" class="overlay" aria-hidden="true">
      <div class="dialog">
        <h2>Panic Erase</h2>
        <p>Erase all captured events? This cannot be undone.</p>
        <div class="dialog-buttons">
          <button id="confirmCancel" type="button" class="ghost">Cancel</button>
          <button id="confirmAccept" type="button">Erase</button>
        </div>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
